<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <title>Yayagol</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f8fae3;
            --green: #171a16;
            --green-light: #3a8a3a;
            --dark: #2c3e50;
            --accent: #0f0c0e;
            --gray: #6b7280;
            --error: #dc2626;
            --btn-height: 53px;
            --btn-radius: 9px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: 'Nunito', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            justify-content: center;
        }

        .left-spacer {
            flex: 0.5;
            background: var(--cream);
        }

        .left-panel {
            width: 595px;
            min-width: 530px;
            background: var(--cream);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 53px 70px;
            overflow-y: auto;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #0f0c0e;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .main-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 60px;
            letter-spacing: 3px;
            color: #0f0c0e;
            line-height: 1;
        }

        .subtitle {
            font-size: 14px;
            color: var(--gray);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .tagline {
            font-size: 18px;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 24px;
            text-align: center;
        }

        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-bottom: 16px;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            height: var(--btn-height);
            background: white;
            color: #1f1f1f;
            border: 2px solid #e5e7eb;
            border-radius: var(--btn-radius);
            font-size: 16.5px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .google-btn:hover { 
            background: #f8f9fa; 
            border-color: #dadce0;
        }

        .fb-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            height: var(--btn-height);
            background: #1877f2;
            color: white;
            border: none;
            border-radius: var(--btn-radius);
            font-size: 16.5px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .fb-btn:hover { background: #1560cc; }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            margin: 4px 0 16px;
            font-size: 13px;
            color: var(--gray);
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #d1d5db;
        }

        /* ── EMAIL FORM ── */
        .form-group {
            width: 100%;
            text-align: left;
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            height: var(--btn-height);
            padding: 0 14px;
            border: 2px solid #e5e7eb;
            border-radius: var(--btn-radius);
            font-size: 16.5px;
            font-family: 'Nunito', sans-serif;
            color: var(--dark);
            background: white;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: var(--green-light); }

        .submit-btn {
            width: 100%;
            height: var(--btn-height);
            background: #de2c4c;
            color: white;
            border: none;
            border-radius: var(--btn-radius);
            font-size: 17.5px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            cursor: pointer;
            margin-top: 4px;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.5px;
        }
        .submit-btn:hover { background: var(--green-light); }
        .submit-btn:active { transform: scale(0.98); }

        .toggle-link {
            margin-top: 14px;
            font-size: 13px;
            color: var(--gray);
            text-align: center;
        }
        .toggle-link span {
            color: var(--green);
            font-weight: 700;
            cursor: pointer;
            text-decoration: underline;
        }

        .error-msg {
            background: #fef2f2;
            color: var(--error);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-top: 10px;
            width: 100%;
            display: none;
        }
        .error-msg.show { display: block; }

        .right-panel {
            flex: 2.25;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--cream);
        }

        .right-panel img {
            width: 50%;
            aspect-ratio: 1;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 8px 40px rgba(45,106,45,0.2);
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow-y: auto;
                height: 100vh;
                min-height: 100vh;
            }

            .left-spacer {
                display: none;
            }

            .right-panel {
                order: -1;
                width: 100%;
                height: 200px;
                padding: 20px 0 0 0;
                flex: none;
                margin: 0;
            }
            .right-panel img {
                width: auto;
                max-width: 90%;
                max-height: 100%;
            }

            .left-panel {
                width: 100%;
                min-width: unset;
                padding: 2px 24px 24px;
                overflow: visible;
                margin: 0;
                flex: 1;
            }
            .logo-area {
                margin-bottom: 14px;
            }
            
            .main-title {
                font-size: 50px;
            }
            
            .subtitle {
                font-size: 13px;
            }
            
            .social-buttons {
                gap: 8px;
                margin-bottom: 12px;
            }
            
            .form-group {
                margin-bottom: 10px;
            }
            
            .divider {
                margin: 8px 0 12px;
            }
            
            .toggle-link {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="left-spacer"></div>
    <div class="left-panel">

        <div class="logo-area">
            <h1 class="main-title"><span style="color:#de2c4c;">Yaya</span>gol</h1>
            <p class="subtitle">Quiniela Familiar · Mundial 2026</p>
        </div>

        <div class="social-buttons">
            <a href="https://api.yayagol.com/oauth2/authorization/google" class="google-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continuar con Google
            </a>

            <a href="https://api.yayagol.com/oauth2/authorization/facebook" class="fb-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="white">
                    <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.313 0 2.686.236 2.686.236v2.97h-1.514c-1.491 0-1.956.93-1.956 1.886v2.268h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
                </svg>
                Continuar con Facebook
            </a>
        </div>

        <div class="divider">o ingresa con tu correo</div>

        <form id="authForm" style="width:100%">
            <div class="form-group" id="nameGroup" style="display:none;">
                <label for="name">Nombre</label>
                <input type="text" id="name" placeholder="Tu nombre">
            </div>

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="tu@correo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Iniciar Sesión</button>
        </form>

        <div class="error-msg" id="errorMsg"></div>

        <p class="toggle-link" id="toggleText">
            ¿No tienes cuenta? <span onclick="toggleMode()">Regístrate</span>
        </p>
        <p style="text-align: center; color: #9ca3af; font-size: 9px; padding-top: 16px;">
            © 2026 Flow Brothers LLC. All rights reserved.
        </p>
    </div>

    <div class="right-panel">
        <img src="yaya.webp" alt="Yayagol">
    </div>

    <script>
        const API_URL = 'https://api.yayagol.com/api';
        let isRegisterMode = false;

        function toggleMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('nameGroup').style.display = isRegisterMode ? 'block' : 'none';
            document.getElementById('submitBtn').textContent = isRegisterMode ? 'Crear Cuenta' : 'Iniciar Sesión';
            document.getElementById('toggleText').innerHTML = isRegisterMode
                ? '¿Ya tienes cuenta? <span onclick="toggleMode()">Inicia sesión</span>'
                : '¿No tienes cuenta? <span onclick="toggleMode()">Regístrate</span>';
            hideError();
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email    = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name     = document.getElementById('name').value;
            const endpoint = isRegisterMode ? '/auth/register' : '/auth/login';
            const body     = isRegisterMode ? { name, email, password } : { email, password };

            try {
                const res = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                    credentials: 'include'
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.message || 'Error en la autenticación.');
                }
                window.location.href = '/my-groups';
            } catch (error) {
                showError(error.message || 'Error al conectar con el servidor.');
            }
        });


        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
        }

        function hideError() {
            document.getElementById('errorMsg').classList.remove('show');
        }
    </script>
</body>
</html>
